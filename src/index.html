<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jenny's Sudoku</title>
    <meta
      name="description"
      content="A daily printable Sudoku puzzle for the UK calendar day."
    />
    <link rel="canonical" href="https://jennysudoku.com/" />
    <meta name="theme-color" content="#fbfaf6" />
    <meta property="og:title" content="Jenny's Sudoku" />
    <meta
      property="og:description"
      content="A daily printable Sudoku with Driftwood Park weather and evening TV listings."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jennysudoku.com/" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <nav class="day-nav no-print" aria-label="Puzzle dates">
        <a class="nav-link" data-action="previous" href="/">Previous Day</a>
        <a class="nav-link" data-action="today" href="/">Today</a>
        <button class="nav-link" data-action="history" type="button">History</button>
      </nav>

      <main class="print-surface" aria-live="polite">
        <header class="page-heading">
          <h1>Jenny's Sudoku</h1>
          <p id="dateText" class="date-text">Loading date...</p>
        </header>

        <section class="primary-actions no-print" aria-label="Puzzle actions">
          <button class="action-button action-button-print" data-action="print" type="button">
            Print
          </button>
          <button class="action-button action-button-pdf" data-action="pdf" type="button">
            Download PDF
          </button>
        </section>

        <section class="puzzle-section" aria-labelledby="puzzleLabel">
          <h2 id="puzzleLabel" class="visually-hidden">Today's Sudoku puzzles</h2>
          <div id="sudokuPuzzles" class="sudoku-puzzles"></div>
        </section>

        <section class="learning-actions no-print" aria-label="Learning tools">
          <div class="keypad" id="keypad" role="toolbar" aria-label="Sudoku keypad">
            <button type="button" class="keypad-btn" data-key="1">1</button>
            <button type="button" class="keypad-btn" data-key="2">2</button>
            <button type="button" class="keypad-btn" data-key="3">3</button>
            <button type="button" class="keypad-btn" data-key="4">4</button>
            <button type="button" class="keypad-btn" data-key="5">5</button>
            <button type="button" class="keypad-btn" data-key="6">6</button>
            <button type="button" class="keypad-btn" data-key="7">7</button>
            <button type="button" class="keypad-btn" data-key="8">8</button>
            <button type="button" class="keypad-btn" data-key="9">9</button>
            <button type="button" class="keypad-btn keypad-clear" data-key="Backspace">Clear</button>
          </div>
          <div class="game-controls">
            <button type="button" class="action-button" id="hintButton">Hint</button>
            <button type="button" class="action-button" id="restartButton">Restart</button>
          </div>
        </section>

        <section
          id="weatherWidget"
          class="weather-widget"
          aria-label="Driftwood Park weather"
          hidden
        ></section>

        <section
          id="tvListingsWidget"
          class="tv-listings-widget"
          aria-label="Tonight's TV listings"
          hidden
        ></section>
      </main>

      <p id="statusText" class="status-text no-print" role="status"></p>
    </div>

    <dialog id="historyDialog" class="history-dialog">
      <form method="dialog" class="dialog-panel">
        <header class="dialog-header">
          <h2>Recent puzzles</h2>
          <button class="dialog-close" type="submit" aria-label="Close">Close</button>
        </header>
        <div id="historyList" class="history-list"></div>
      </form>
    </dialog>

    <script type="module" src="/app.js"></script>
  </body>
</html>
